<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ask about Q</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.4rem;
      color: #222;
      margin-bottom: 1.5rem;
    }

    #chat-box {
      width: 100%;
      max-width: 700px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 1.5rem;
      min-height: 300px;
      max-height: 60vh;
      overflow-y: auto;
      margin-bottom: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      max-width: 85%;
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .message.user {
      background: #2563eb;
      color: white;
      align-self: flex-end;
    }

    .message.bot {
      background: #f0f0f0;
      color: #222;
      align-self: flex-start;
    }

    .message.error {
      background: #fee2e2;
      color: #b91c1c;
      align-self: flex-start;
    }

    #input-row {
      display: flex;
      gap: 0.5rem;
      width: 100%;
      max-width: 700px;
    }

    #question {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #question:focus { border-color: #2563eb; }

    #send-btn {
      padding: 0.75rem 1.25rem;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    #send-btn:hover { background: #1d4ed8; }
    #send-btn:disabled { background: #93c5fd; cursor: not-allowed; }

    .thinking {
      color: #888;
      font-style: italic;
      font-size: 0.9rem;
      align-self: flex-start;
    }
  </style>
</head>
<body>
  <h1>💬 Ask anything about Q</h1>

  <div id="chat-box">
    <div class="message bot">
      Hi! I'm Q's portfolio assistant. Ask me about his skills, projects, education, or experience.
    </div>
  </div>

  <div id="input-row">
    <input
      id="question"
      type="text"
      placeholder="e.g. What databases does Q know?"
      autocomplete="off"
    />
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>

  <script>
    const chatBox = document.getElementById("chat-box");
    const input = document.getElementById("question");
    const btn = document.getElementById("send-btn");

    input.addEventListener("keydown", e => {
      if (e.key === "Enter") sendMessage();
    });

    function addMessage(text, type) {
      const div = document.createElement("div");
      div.className = `message ${type}`;
      div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const question = input.value.trim();
      if (!question) return;

      input.value = "";
      btn.disabled = true;
      addMessage(question, "user");
      const thinking = addMessage("Thinking...", "thinking");

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question })
        });

        const data = await res.json();
        thinking.remove();

        if (!res.ok) {
          addMessage("Error: " + (data.detail || "Something went wrong"), "error");
        } else {
          addMessage(data.answer, "bot");
        }
      } catch (err) {
        thinking.remove();
        addMessage("Could not reach the server. Is it running?", "error");
      } finally {
        btn.disabled = false;
        input.focus();
      }
    }
  </script>
</body>
</html>
